<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ワンちゃんと学ぶ ハングル読み方クイズ 🐶</title>
<style>
  :root{
    --pink-bg:#ffe3ef;
    --pink-1:#ffb6d5;
    --pink-2:#ff8fbf;
    --pink-deep:#ff5fa2;
    --pink-soft:#fff0f6;
    --text:#5a3a4a;
    --correct:#7fd99a;
    --wrong:#ff8a8a;
    --shadow:rgba(255,95,162,.25);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Hiragino Maru Gothic ProN","Rounded Mplus 1c","Segoe UI",sans-serif;
    background:linear-gradient(160deg,#ffe9f3 0%,#ffd6e8 60%,#ffc2dd 100%);
    color:var(--text);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
  }
  /* floating decorative paws */
  .deco{position:fixed;font-size:28px;opacity:.35;pointer-events:none;animation:floaty 6s ease-in-out infinite;}
  @keyframes floaty{0%,100%{transform:translateY(0) rotate(-8deg);}50%{transform:translateY(-18px) rotate(8deg);}}

  .card{
    width:100%;
    max-width:440px;
    background:var(--pink-soft);
    border-radius:32px;
    padding:28px 26px 34px;
    box-shadow:0 18px 50px var(--shadow);
    position:relative;
    border:4px solid #fff;
  }

  h1{
    text-align:center;
    font-size:21px;
    margin:6px 0 4px;
    color:var(--pink-deep);
    letter-spacing:.5px;
  }
  .subtitle{text-align:center;font-size:13px;color:#b87a96;margin-bottom:14px;}

  /* progress + score */
  .topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:13px;
    font-weight:bold;
    color:var(--pink-deep);
    margin-bottom:10px;
  }
  .progress-track{
    height:12px;
    background:#ffd9e8;
    border-radius:999px;
    overflow:hidden;
    margin-bottom:18px;
  }
  .progress-fill{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,var(--pink-2),var(--pink-deep));
    border-radius:999px;
    transition:width .4s ease;
  }

  /* dog */
  .dog{
    text-align:center;
    margin-bottom:8px;
  }
  .dog svg{width:120px;height:120px;transition:transform .3s;}
  .dog.happy svg{animation:bounce .6s;}
  .dog.sad svg{animation:shake .5s;}
  @keyframes bounce{0%,100%{transform:translateY(0);}30%{transform:translateY(-22px) scale(1.05);}60%{transform:translateY(0);}}
  @keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-10px) rotate(-4deg);}40%{transform:translateX(10px) rotate(4deg);}60%{transform:translateX(-8px);}80%{transform:translateX(8px);}}

  .speech{
    background:#fff;
    border:3px solid var(--pink-1);
    border-radius:18px;
    padding:8px 14px;
    font-size:14px;
    font-weight:bold;
    text-align:center;
    margin:0 auto 14px;
    max-width:300px;
    position:relative;
    min-height:20px;
    color:var(--pink-deep);
  }
  .speech::after{
    content:"";position:absolute;top:-12px;left:50%;transform:translateX(-50%);
    border:6px solid transparent;border-bottom-color:var(--pink-1);
  }

  /* question */
  .question-box{
    text-align:center;
    margin-bottom:6px;
  }
  .hangul{
    font-size:78px;
    font-weight:bold;
    color:var(--pink-deep);
    line-height:1;
    text-shadow:2px 3px 0 #ffd0e3;
  }
  .qlabel{font-size:13px;color:#b87a96;margin-top:6px;}

  /* options */
  .options{display:grid;gap:12px;margin-top:18px;}
  .opt{
    background:#fff;
    border:3px solid var(--pink-1);
    border-radius:18px;
    padding:14px;
    font-size:18px;
    font-weight:bold;
    color:var(--text);
    cursor:pointer;
    transition:all .15s;
    box-shadow:0 4px 0 #ffc6dd;
  }
  .opt:hover:not(:disabled){transform:translateY(-2px);background:var(--pink-soft);}
  .opt:active:not(:disabled){transform:translateY(2px);box-shadow:0 1px 0 #ffc6dd;}
  .opt:disabled{cursor:default;}
  .opt.correct{background:var(--correct);border-color:#5cc47c;color:#fff;box-shadow:0 4px 0 #4ca568;}
  .opt.wrong{background:var(--wrong);border-color:#ff6b6b;color:#fff;box-shadow:0 4px 0 #e25c5c;}

  .next-btn{
    width:100%;
    margin-top:18px;
    padding:14px;
    font-size:16px;
    font-weight:bold;
    color:#fff;
    background:linear-gradient(90deg,var(--pink-2),var(--pink-deep));
    border:none;
    border-radius:18px;
    cursor:pointer;
    box-shadow:0 5px 0 #d94d8a;
    transition:all .15s;
  }
  .next-btn:hover{transform:translateY(-2px);}
  .next-btn:active{transform:translateY(3px);box-shadow:0 2px 0 #d94d8a;}
  .hidden{display:none;}

  /* result screen */
  .result{text-align:center;}
  .result .bigscore{font-size:46px;font-weight:bold;color:var(--pink-deep);margin:10px 0;}
  .result .stars{font-size:32px;margin-bottom:10px;}
  .result p{font-size:15px;color:#a86d88;}

  /* menu screen */
  .menu{text-align:center;}
  .menu .lead{font-size:14px;color:#a86d88;margin:4px 0 18px;}
  .mode-list{display:grid;gap:14px;margin-top:8px;}
  .mode-btn{
    background:#fff;
    border:3px solid var(--pink-1);
    border-radius:20px;
    padding:16px 14px;
    cursor:pointer;
    transition:all .15s;
    box-shadow:0 5px 0 #ffc6dd;
    text-align:left;
    display:flex;
    align-items:center;
    gap:14px;
  }
  .mode-btn:hover{transform:translateY(-2px);background:var(--pink-soft);}
  .mode-btn:active{transform:translateY(3px);box-shadow:0 2px 0 #ffc6dd;}
  .mode-btn .emoji{font-size:32px;line-height:1;}
  .mode-btn .mtitle{font-size:18px;font-weight:bold;color:var(--pink-deep);}
  .mode-btn .mdesc{font-size:12px;color:#b87a96;margin-top:2px;}

  .home-btn{
    width:100%;
    margin-top:10px;
    padding:12px;
    font-size:14px;
    font-weight:bold;
    color:var(--pink-deep);
    background:#fff;
    border:3px solid var(--pink-1);
    border-radius:18px;
    cursor:pointer;
    box-shadow:0 4px 0 #ffc6dd;
    transition:all .15s;
  }
  .home-btn:hover{transform:translateY(-2px);background:var(--pink-soft);}
  .home-btn:active{transform:translateY(2px);box-shadow:0 1px 0 #ffc6dd;}
</style>
</head>
<body>

<script>
/* ===== クイズデータ ===== */

/* 1文字（基本の文字） */
const SINGLE = [
  {h:"가", r:"ガ (ga)"},   {h:"나", r:"ナ (na)"},   {h:"다", r:"ダ (da)"},
  {h:"라", r:"ラ (ra)"},   {h:"마", r:"マ (ma)"},   {h:"바", r:"バ (ba)"},
  {h:"사", r:"サ (sa)"},   {h:"아", r:"ア (a)"},    {h:"자", r:"ジャ (ja)"},
  {h:"하", r:"ハ (ha)"},   {h:"고", r:"ゴ (go)"},   {h:"노", r:"ノ (no)"},
  {h:"도", r:"ド (do)"},   {h:"로", r:"ロ (ro)"},   {h:"모", r:"モ (mo)"},
  {h:"보", r:"ボ (bo)"},   {h:"소", r:"ソ (so)"},   {h:"오", r:"オ (o)"},
  {h:"구", r:"グ (gu)"},   {h:"누", r:"ヌ (nu)"},   {h:"두", r:"ドゥ (du)"},
  {h:"무", r:"ム (mu)"},   {h:"부", r:"ブ (bu)"},   {h:"수", r:"ス (su)"},
  {h:"우", r:"ウ (u)"},    {h:"기", r:"ギ (gi)"},   {h:"니", r:"ニ (ni)"},
  {h:"미", r:"ミ (mi)"},   {h:"비", r:"ビ (bi)"},   {h:"시", r:"シ (si)"},
  {h:"이", r:"イ (i)"},    {h:"카", r:"カ (ka)"},   {h:"타", r:"タ (ta)"},
  {h:"파", r:"パ (pa)"},   {h:"러", r:"ロ (reo)"}
];

/* ぱっちむ（받침＝終わりの子音つき1文字） */
const PATCHIM = [
  {h:"강", r:"カン (gang)"},  {h:"산", r:"サン (san)"},   {h:"밤", r:"パム (bam)"},
  {h:"물", r:"ムル (mul)"},   {h:"밥", r:"パプ (bap)"},   {h:"책", r:"チェク (chaek)"},
  {h:"곰", r:"コム (gom)"},   {h:"문", r:"ムン (mun)"},   {h:"길", r:"キル (gil)"},
  {h:"발", r:"パル (bal)"},   {h:"김", r:"キム (gim)"},   {h:"집", r:"チプ (jip)"},
  {h:"손", r:"ソン (son)"},   {h:"눈", r:"ヌン (nun)"},   {h:"봄", r:"ポム (bom)"},
  {h:"공", r:"コン (gong)"},  {h:"한", r:"ハン (han)"},   {h:"별", r:"ピョル (byeol)"},
  {h:"옷", r:"オッ (ot)"},    {h:"꽃", r:"コッ (kkot)"},  {h:"방", r:"パン (bang)"},
  {h:"섬", r:"ソム (seom)"},  {h:"닭", r:"タク (dak)"},   {h:"빵", r:"パン (ppang)"}
];

/* 複数文字（たんご） */
const WORD = [
  {h:"사랑", r:"サラン (sarang・愛)"},      {h:"한국", r:"ハングク (hanguk・韓国)"},
  {h:"사람", r:"サラム (saram・人)"},       {h:"학교", r:"ハッキョ (hakgyo・学校)"},
  {h:"친구", r:"チング (chingu・友達)"},    {h:"가방", r:"カバン (gabang・カバン)"},
  {h:"김치", r:"キムチ (gimchi)"},          {h:"안녕", r:"アンニョン (annyeong)"},
  {h:"감사", r:"カムサ (gamsa・感謝)"},     {h:"한글", r:"ハングル (hangeul)"},
  {h:"나라", r:"ナラ (nara・国)"},          {h:"우유", r:"ウユ (uyu・牛乳)"},
  {h:"머리", r:"モリ (meori・頭)"},         {h:"노래", r:"ノレ (norae・歌)"},
  {h:"바다", r:"パダ (bada・海)"},          {h:"커피", r:"コピ (keopi・コーヒー)"},
  {h:"가족", r:"カジョク (gajok・家族)"},   {h:"시간", r:"シガン (sigan・時間)"},
  {h:"학생", r:"ハクセン (haksaeng・学生)"},{h:"선물", r:"ソンムル (seonmul・贈り物)"},
  {h:"비빔밥", r:"ピビンバ (bibimbap)"},    {h:"선생님", r:"ソンセンニム (先生)"}
];

const MODES = {
  single:  {data:SINGLE,  label:"この ハングルの 読み方は？", quizTitle:"1文字クイズ"},
  patchim: {data:PATCHIM, label:"ぱっちむ（받침）の 読み方は？", quizTitle:"ぱっちむクイズ"},
  word:    {data:WORD,    label:"この たんご の 読み方は？",   quizTitle:"たんごクイズ"}
};

const PRAISE = ["せいかい！🎉","えらい！💗","ワンダフル！🐾","かしこい！⭐","その調子！😊"];
const NOPE   = ["おしい！💦","ドンマイ！🐶","つぎは いける！","だいじょうぶ！💕"];

const TOTAL = 10;
let questions = [];
let idx = 0, score = 0;
let currentMode = "single";

const qcount=document.getElementById('qcount');
const scoreText=document.getElementById('scoreText');
const progress=document.getElementById('progress');
const hangulEl=document.getElementById('hangul');
const qlabel=document.getElementById('qlabel');
const optionsEl=document.getElementById('options');
const nextBtn=document.getElementById('nextBtn');
const speech=document.getElementById('speech');
const dog=document.getElementById('dog');
const menuArea=document.getElementById('menuArea');
const quizArea=document.getElementById('quizArea');
const resultArea=document.getElementById('resultArea');

function shuffle(a){return a.map(v=>[Math.random(),v]).sort((x,y)=>x[0]-y[0]).map(v=>v[1]);}

function buildQuestions(){
  const pool = MODES[currentMode].data;
  // 出題数は最大 TOTAL（データが少なければその分だけ）
  const picked = shuffle(pool).slice(0, Math.min(TOTAL, pool.length));
  questions = picked.map(q=>{
    const wrongs = shuffle(pool.filter(x=>x.r!==q.r)).slice(0,3).map(x=>x.r);
    const opts = shuffle([q.r, ...wrongs]);
    return {h:q.h, answer:q.r, opts};
  });
}

function render(){
  const q = questions[idx];
  const total = questions.length;
  qcount.textContent = `問題 ${idx+1} / ${total}`;
  scoreText.textContent = `⭐ ${score}`;
  progress.style.width = `${(idx/total)*100}%`;
  hangulEl.textContent = q.h;
  // 文字数に応じてサイズ調整（単語が長くてもはみ出さない）
  hangulEl.style.fontSize = q.h.length<=1 ? "78px" : q.h.length===2 ? "62px" : "48px";
  qlabel.textContent = MODES[currentMode].label;
  speech.textContent = "この字、なんて読むのかな？🐾";
  dog.className = "dog";
  optionsEl.innerHTML = "";
  q.opts.forEach(opt=>{
    const b=document.createElement('button');
    b.className='opt';
    b.textContent=opt;
    b.onclick=()=>choose(b,opt,q.answer);
    optionsEl.appendChild(b);
  });
  nextBtn.classList.add('hidden');
}

function choose(btn, picked, answer){
  [...optionsEl.children].forEach(b=>{
    b.disabled=true;
    if(b.textContent===answer) b.classList.add('correct');
  });
  if(picked===answer){
    score++;
    scoreText.textContent = `⭐ ${score}`;
    speech.textContent = PRAISE[Math.floor(Math.random()*PRAISE.length)];
    dog.className="dog happy";
  }else{
    btn.classList.add('wrong');
    speech.textContent = NOPE[Math.floor(Math.random()*NOPE.length)];
    dog.className="dog sad";
  }
  nextBtn.textContent = (idx===questions.length-1) ? "けっか を みる 🏆" : "つぎの問題へ ➡️";
  nextBtn.classList.remove('hidden');
}

nextBtn.onclick=()=>{
  idx++;
  if(idx>=questions.length){ showResult(); }
  else { render(); }
};

function showResult(){
  const total = questions.length;
  quizArea.classList.add('hidden');
  resultArea.classList.remove('hidden');
  document.getElementById('finalScore').textContent = `${score} / ${total}`;
  const ratio = score/total;
  let stars = ratio>=0.9?"⭐⭐⭐":ratio>=0.6?"⭐⭐":ratio>=0.3?"⭐":"💫";
  document.getElementById('resultStars').textContent = stars;
  let msg = ratio>=0.9?"カンペキ！ハングルマスター犬だね！🐶👑"
          : ratio>=0.6?"いいかんじ！もう少しでマスター！💗"
          : ratio>=0.3?"その調子！くり返しておぼえよう！🐾"
          : "だいじょうぶ！いっしょに練習しよう！💕";
  document.getElementById('resultMsg').textContent = msg;
}

/* ===== 画面遷移 ===== */
function startQuiz(mode){
  currentMode = mode;
  idx=0; score=0;
  buildQuestions();
  menuArea.classList.add('hidden');
  resultArea.classList.add('hidden');
  quizArea.classList.remove('hidden');
  render();
}

function goMenu(){
  quizArea.classList.add('hidden');
  resultArea.classList.add('hidden');
  menuArea.classList.remove('hidden');
}

document.querySelectorAll('.mode-btn').forEach(btn=>{
  btn.onclick=()=>startQuiz(btn.dataset.mode);
});
document.getElementById('homeBtn').onclick=goMenu;
document.getElementById('resultHomeBtn').onclick=goMenu;
document.getElementById('retryBtn').onclick=()=>startQuiz(currentMode);

/* start: メニューから */
goMenu();
</script>
</body>
</html>
